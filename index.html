<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Censimento PdR — ASIM</title>
  <style>
    :root {
      --blue: #1a56db;
      --blue-light: #e8f0fe;
      --blue-dark: #1241a5;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --green: #059669;
      --red: #dc2626;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--blue);
      color: #fff;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    header .subtitle {
      font-size: .85rem;
      opacity: .85;
      margin-top: 2px;
    }

    /* MAIN LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* SEARCH BOX */
    .search-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .search-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .5rem;
      display: block;
    }
    .search-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .search-input-wrap {
      flex: 1 1 280px;
      position: relative;
    }
    .search-input-wrap .icon {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 1.1rem;
      pointer-events: none;
    }
    input[type="text"], select {
      width: 100%;
      height: 2.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 .9rem;
      font-size: .95rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    input[type="text"] {
      padding-left: 2.6rem;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }
    .filter-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      margin-top: .75rem;
    }
    .filter-row label {
      font-size: .8rem;
      color: var(--gray);
      font-weight: 500;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      flex: 1 1 160px;
    }
    .filter-group select {
      height: 2.25rem;
      font-size: .85rem;
    }
    .btn-clear {
      height: 2.75rem;
      padding: 0 1.25rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--gray-light);
      color: var(--gray);
      font-size: .875rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .btn-clear:hover { background: #e9ebee; }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: .875rem;
      color: var(--gray);
    }
    .status-bar strong { color: var(--text); }
    #loading-msg {
      text-align: center;
      padding: 3rem;
      color: var(--gray);
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULTS GRID */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .card-header {
      background: var(--blue-light);
      border-bottom: 1px solid #c7d9f9;
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pdr-code {
      font-family: 'Courier New', monospace;
      font-size: .95rem;
      font-weight: 700;
      color: var(--blue-dark);
      letter-spacing: .03em;
    }
    .badge {
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .5rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .badge-active { background: #d1fae5; color: var(--green); }
    .badge-ceased { background: #fee2e2; color: var(--red); }

    .card-body { padding: .85rem 1rem; }
    .card-field {
      display: flex;
      gap: .5rem;
      margin-bottom: .45rem;
      font-size: .875rem;
      align-items: flex-start;
    }
    .card-field .lbl {
      color: var(--gray);
      font-weight: 500;
      min-width: 70px;
      flex-shrink: 0;
    }
    .card-field .val {
      color: var(--text);
      word-break: break-word;
    }

    /* FOTO SECTION */
    .foto-section {
      border-top: 1px solid var(--border);
      padding: .75rem 1rem;
      background: #fafafa;
    }
    .foto-title {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .5rem;
    }
    .foto-grid {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .foto-item {
      flex: 1 1 140px;
    }
    .foto-item .foto-label {
      font-size: .7rem;
      color: var(--gray);
      margin-bottom: .3rem;
      font-weight: 500;
    }
    /* Anteprima Drive iframe */
    .foto-preview {
      width: 100%;
      height: 120px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f0f0f0;
    }
    /* Link Drive (quando non c'è anteprima iframe) */
    .foto-link {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .75rem;
      border: 1.5px solid var(--blue);
      border-radius: 6px;
      color: var(--blue);
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      background: var(--blue-light);
      transition: background .15s;
    }
    .foto-link:hover { background: #d0e2fd; }
    .foto-link .drive-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    /* Placeholder quando foto non ancora mappata */
    .foto-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border: 1.5px dashed var(--border);
      border-radius: 6px;
      font-size: .75rem;
      color: #aaa;
    }
    .foto-code {
      font-family: monospace;
      font-size: .75rem;
      background: var(--gray-light);
      padding: .1rem .4rem;
      border-radius: 4px;
      color: var(--gray);
    }

    /* NO RESULTS */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--gray);
    }
    .no-results .big { font-size: 2.5rem; margin-bottom: .5rem; }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .pagination button {
      min-width: 2.25rem;
      height: 2.25rem;
      padding: 0 .75rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: .875rem;
      cursor: pointer;
      transition: background .1s, border-color .1s;
    }
    .pagination button:hover { background: var(--blue-light); border-color: var(--blue); }
    .pagination button.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 700;
    }
    .pagination button:disabled { opacity: .4; cursor: default; }

    @media (max-width: 600px) {
      #results { grid-template-columns: 1fr; }
      .search-row, .filter-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Censimento PdR — ASIM</div>
    <div class="subtitle">Ricerca Punti di Riconsegna</div>
  </div>
</header>

<div class="container">

  <!-- SEZIONE RICERCA -->
  <div class="search-section">
    <span class="search-label">Ricerca</span>
    <div class="search-row">
      <div class="search-input-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput"
               placeholder="Cerca per codice PdR, utente o indirizzo…"
               autocomplete="off" />
      </div>
      <button class="btn-clear" onclick="clearSearch()">✕ Cancella</button>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label for="filterLocalita">Località</label>
        <select id="filterLocalita"><option value="">Tutte le località</option></select>
      </div>
      <div class="filter-group">
        <label for="filterClasse">Classe</label>
        <select id="filterClasse"><option value="">Tutte le classi</option></select>
      </div>
      <div class="filter-group">
        <label for="filterCessazione">Stato</label>
        <select id="filterCessazione">
          <option value="">Tutti</option>
          <option value="attivi">Solo attivi</option>
          <option value="cessati">Solo cessati</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterFoto">Foto</label>
        <select id="filterFoto">
          <option value="">Tutte</option>
          <option value="con_link">Con link Drive</option>
          <option value="senza_link">Senza link Drive</option>
        </select>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div id="statusText">Caricamento dati in corso…</div>
    <div id="pageInfo"></div>
  </div>

  <!-- LOADING -->
  <div id="loading-msg">
    <span class="spinner"></span> Caricamento dei dati PdR…
  </div>

  <!-- RISULTATI -->
  <div id="results"></div>

  <!-- PAGINAZIONE -->
  <div class="pagination" id="pagination"></div>

</div>

<script>
  const PAGE_SIZE = 24;
  let allData = [];
  let driveLinks = {};
  let filtered = [];
  let currentPage = 1;

  // ─── CARICAMENTO DATI ────────────────────────────────────────────────────────
  async function loadData() {
    try {
      const [dataRes, driveRes] = await Promise.allSettled([
        fetch('data.json'),
        fetch('drive_links.json')
      ]);

      if (dataRes.status === 'fulfilled' && dataRes.value.ok) {
        allData = await dataRes.value.json();
      } else {
        throw new Error('Impossibile caricare data.json');
      }

      if (driveRes.status === 'fulfilled' && driveRes.value.ok) {
        const raw = await driveRes.value.json();
        // Filtra le chiavi speciali che iniziano con "_"
        Object.entries(raw).forEach(([k,v]) => {
          if (!k.startsWith('_')) driveLinks[k] = v;
        });
      }

      populateFilters();
      document.getElementById('loading-msg').style.display = 'none';
      doSearch();
    } catch (e) {
      document.getElementById('loading-msg').innerHTML =
        `<div style="color:var(--red)">Errore: ${e.message}</div>`;
    }
  }

  // ─── POPOLAMENTO FILTRI ──────────────────────────────────────────────────────
  function populateFilters() {
    const localities = [...new Set(allData.map(r => r.localita).filter(Boolean))].sort();
    const sel = document.getElementById('filterLocalita');
    localities.forEach(l => {
      const o = document.createElement('option');
      o.value = l;
      o.textContent = l.replace(/^\[.+?\]\s*-\s*/, ''); // rimuovi "[N] - "
      sel.appendChild(o);
    });

    const classes = [...new Set(allData.map(r => r.classe).filter(Boolean))].sort();
    const selC = document.getElementById('filterClasse');
    classes.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      selC.appendChild(o);
    });
  }

  // ─── RICERCA ─────────────────────────────────────────────────────────────────
  function doSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const localita = document.getElementById('filterLocalita').value;
    const classe = document.getElementById('filterClasse').value;
    const cessazione = document.getElementById('filterCessazione').value;
    const fotoFilter = document.getElementById('filterFoto').value;

    filtered = allData.filter(r => {
      if (q) {
        const match =
          r.pdr.toLowerCase().includes(q) ||
          r.utente.toLowerCase().includes(q) ||
          r.via.toLowerCase().includes(q) ||
          r.matricola.toLowerCase().includes(q);
        if (!match) return false;
      }
      if (localita && r.localita !== localita) return false;
      if (classe && r.classe !== classe) return false;
      if (cessazione === 'attivi' && r.cessazione !== '0') return false;
      if (cessazione === 'cessati' && r.cessazione === '0') return false;
      if (fotoFilter === 'con_link') {
        if (!driveLinks[r.fotoPan] && !driveLinks[r.fotoPart]) return false;
      }
      if (fotoFilter === 'senza_link') {
        if (driveLinks[r.fotoPan] || driveLinks[r.fotoPart]) return false;
      }
      return true;
    });

    currentPage = 1;
    renderResults();
  }

  // ─── RENDERING ───────────────────────────────────────────────────────────────
  function renderResults() {
    const container = document.getElementById('results');
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filtered.slice(start, start + PAGE_SIZE);

    // Status
    const q = document.getElementById('searchInput').value.trim();
    document.getElementById('statusText').innerHTML =
      total === 0 ? 'Nessun risultato trovato' :
      `<strong>${total.toLocaleString('it-IT')}</strong> PdR trovati${q ? ` per "<em>${q}</em>"` : ''}`;
    document.getElementById('pageInfo').textContent =
      total > 0 ? `Pagina ${currentPage} di ${totalPages}` : '';

    if (total === 0) {
      container.innerHTML = `
        <div class="no-results">
          <div class="big">🔎</div>
          <div>Nessun PdR trovato.</div>
          <div style="font-size:.85rem;margin-top:.5rem;color:#aaa">
            Prova a modificare la ricerca o i filtri.
          </div>
        </div>`;
      renderPagination(0, 1);
      return;
    }

    container.innerHTML = page.map(r => buildCard(r)).join('');
    renderPagination(total, totalPages);
  }

  function buildCard(r) {
    const ceased = r.cessazione !== '0';
    const badge = ceased
      ? '<span class="badge badge-ceased">Cessato</span>'
      : '<span class="badge badge-active">Attivo</span>';

    const localitaClean = r.localita.replace(/^\[.+?\]\s*-\s*/, '');

    return `
      <div class="card">
        <div class="card-header">
          <span class="pdr-code">${r.pdr}</span>
          ${badge}
        </div>
        <div class="card-body">
          <div class="card-field">
            <span class="lbl">Utente</span>
            <span class="val">${r.utente || '—'}</span>
          </div>
          <div class="card-field">
            <span class="lbl">Indirizzo</span>
            <span class="val">${r.via || '—'}</span>
          </div>
          <div class="card-field">
            <span class="lbl">Località</span>
            <span class="val">${localitaClean || '—'}</span>
          </div>
          <div class="card-field">
            <span class="lbl">Matricola</span>
            <span class="val">${r.matricola || '—'}</span>
          </div>
          <div class="card-field">
            <span class="lbl">Contatore</span>
            <span class="val">${r.marca} ${r.modello} — Classe ${r.classe}</span>
          </div>
        </div>
        <div class="foto-section">
          <div class="foto-title">📷 Documentazione fotografica</div>
          <div class="foto-grid">
            ${buildFoto(r.fotoPan, 'Panoramica')}
            ${buildFoto(r.fotoPart, 'Particolare')}
          </div>
        </div>
      </div>`;
  }

  function buildFoto(code, label) {
    if (!code || code === '0' || code === '') {
      return `<div class="foto-item">
        <div class="foto-label">${label}</div>
        <div class="foto-placeholder">—</div>
      </div>`;
    }

    const driveId = driveLinks[code];

    if (driveId) {
      // Mostra anteprima iframe + link
      return `<div class="foto-item">
        <div class="foto-label">${label} <span class="foto-code">${code}</span></div>
        <iframe class="foto-preview"
          src="https://drive.google.com/file/d/${driveId}/preview"
          allow="autoplay"
          loading="lazy"></iframe>
        <a class="foto-link" href="https://drive.google.com/file/d/${driveId}/view" target="_blank" rel="noopener noreferrer" style="margin-top:.35rem">
          <svg class="drive-icon" viewBox="0 0 87.3 78" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L28.25 48H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066DA"/>
            <path d="M43.65 24L29.1 0c-1.35.8-2.5 1.9-3.3 3.3L1.2 43.5c-.8 1.35-1.2 2.9-1.2 4.5h28.25z" fill="#00AC47"/>
            <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3L80.1 68l4.55-7.65c.8-1.4 1.2-2.95 1.2-4.5H57.6l5.9 11.5z" fill="#EA4335"/>
            <path d="M43.65 24L58.2 0H29.1z" fill="#00832D"/>
            <path d="M57.6 48L43.65 24 29.1 48z" fill="#2684FC"/>
            <path d="M87.3 55.65c0-1.55-.4-3.1-1.2-4.5L62.5 11.8c-.8-1.4-1.95-2.5-3.3-3.3l-15.55 27 14.95 26z" fill="#FFBA00"/>
          </svg>
          Apri in Drive
        </a>
      </div>`;
    }

    // Link non ancora mappato → placeholder con codice foto
    return `<div class="foto-item">
      <div class="foto-label">${label} <span class="foto-code">${code}</span></div>
      <div class="foto-placeholder" title="Link Drive non ancora mappato">
        🗂 Non mappato
      </div>
    </div>`;
  }

  // ─── PAGINAZIONE ──────────────────────────────────────────────────────────────
  function renderPagination(total, totalPages) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = '';
    html += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prec</button>`;

    const range = pageRange(currentPage, totalPages);
    range.forEach(p => {
      if (p === '…') {
        html += `<button disabled>…</button>`;
      } else {
        html += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
      }
    });

    html += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Succ ›</button>`;
    pg.innerHTML = html;
  }

  function pageRange(cur, total) {
    if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
    const pages = [];
    pages.push(1);
    if (cur > 3) pages.push('…');
    for (let i=Math.max(2,cur-1); i<=Math.min(total-1,cur+1); i++) pages.push(i);
    if (cur < total-2) pages.push('…');
    pages.push(total);
    return pages;
  }

  function goPage(n) {
    currentPage = n;
    renderResults();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterLocalita').value = '';
    document.getElementById('filterClasse').value = '';
    document.getElementById('filterCessazione').value = '';
    document.getElementById('filterFoto').value = '';
    doSearch();
  }

  // ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 250);
  });
  ['filterLocalita','filterClasse','filterCessazione','filterFoto'].forEach(id => {
    document.getElementById(id).addEventListener('change', doSearch);
  });

  // ─── AVVIO ───────────────────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
